<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudyVault Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gradient-to-tr from-slate-900 via-slate-800 to-cyan-900 h-screen w-screen flex items-center justify-center overflow-hidden font-[Poppins]">
    <!-- Visual background blobs -->
    <div class="absolute w-96 h-96 bg-cyan-500 rounded-full opacity-10 blur-3xl -top-20 -left-20"></div>
    <div class="absolute w-96 h-96 bg-purple-500 rounded-full opacity-10 blur-3xl -bottom-20 -right-20"></div>

    <!-- Login Card Container -->
    <div class="relative z-10 w-full max-w-md p-6">
        <div class="bg-slate-900/60 backdrop-blur-xl border border-slate-700/50 rounded-3xl p-8 shadow-2xl text-white">
            <!-- Brand header -->
            <div class="text-center mb-8">
                <a href="index.html" class="inline-block hover:scale-105 transition duration-300">
                    <div class="w-16 h-16 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-cyan-500/20">
                        <i class="fas fa-shield-halved text-2xl text-white"></i>
                    </div>
                </a>
                <h1 class="text-3xl font-extrabold tracking-tight">Study<span class="text-cyan-400">Vault</span></h1>
                <p class="text-xs text-slate-400 mt-2 uppercase tracking-widest font-semibold">Student Portal Authentication</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-6">
                <!-- User ID input -->
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-2">Student Portal ID / Email</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fas fa-user-graduate text-sm"></i>
                        </span>
                        <input type="text" placeholder="STU-2026-8947" required
                            class="w-full pl-11 pr-4 py-3.5 bg-slate-800/80 border border-slate-700/50 focus:border-cyan-500 rounded-xl text-sm focus:outline-none text-slate-300 font-medium transition">
                    </div>
                </div>

                <!-- Password input -->
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-300 mb-2">Security Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fas fa-lock text-sm"></i>
                        </span>
                        <input type="password" placeholder="••••••••••••" required
                            class="w-full pl-11 pr-4 py-3.5 bg-slate-800/80 border border-slate-700/50 focus:border-cyan-500 rounded-xl text-sm focus:outline-none text-slate-300 tracking-widest transition">
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="loginBtn"
                    class="w-full py-4 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold rounded-xl transition duration-300 shadow-lg shadow-cyan-500/20 flex items-center justify-center gap-2">
                    <span>Authenticate & Enter</span>
                    <i class="fas fa-arrow-right text-xs"></i>
                </button>
            </form>

            <div class="mt-6 text-center text-xs text-slate-400">
                <p>Don't have an account? <a href="signup.html" class="text-cyan-400 hover:underline font-semibold">Sign Up</a></p>
                <p class="mt-3"><a href="index.html" class="text-slate-500 hover:text-slate-300"><i class="fas fa-arrow-left text-xxs mr-1"></i> Back to Homepage</a></p>
            </div>
        </div>
    </div>

    <!-- Load scripts -->
    <script src="loan-application.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i> Authenticating...';
            
            if (typeof showNotification === 'function') {
                showNotification('Access Granted', 'Welcome back to StudyVault! Loading student portal...', 'success');
            }
            
            setTimeout(() => {
                window.location.href = 'student-home.html';
            }, 1500);
        });
    </script>
</body>

</html>
